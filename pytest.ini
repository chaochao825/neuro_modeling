[pytest]
addopts = -ra --import-mode=importlib
testpaths =
    local_plasticity_gated_dynamics/tests
    shared_dynamics_real_data/tests
    minimal_computation_python/tests
    neural_multiscale_tests/tests
pythonpath =
    .
    local_plasticity_gated_dynamics
    minimal_computation_python
    neural_multiscale_tests
markers =
    slow: formal-size or multi-seed experiment tests
    integration: tests requiring optional data or services
